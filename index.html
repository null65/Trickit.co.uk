<!DOCTYPE HTML>
<html>
<head>
  <h1><center>New TrickIt website coming soon in:</center></h1>
  <hr>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
p {
  text-align: center;
  font-size: 60px;
  margin-top: 0px;
}
 
</style>
</head>
<body>

<p id="trickit"></p>

<script>

var countDownDate = new Date("September 10, 2024 10:00:00").getTime();


var x = setInterval(function() {

  
  var now = new Date().getTime();
    
 
  var distance = countDownDate - now;
    
 
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);
    

  document.getElementById("trickit").innerHTML = days + "d " + hours + "h "
  + minutes + "m " + seconds + "s ";
    
 
  if (distance < 0) {
    clearInterval(x);
    document.getElementById("trickit").innerHTML = "Please Reload Your Web Browser";
  }
}, 1000);
  
</script>

</body>
</html>
